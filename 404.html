<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eltévelyedtél? · Botoscope</title>
  <meta name="robots" content="noindex">
  <script>
    (function () {
      try {
        var k = 'botoscope-theme', s = localStorage.getItem(k);
        var t = s || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0a0f; --blue:#4a6b8a; --blue-l:#6a8fad; --brown:#7a5230;
      --cream:#ede0c4; --cream-d:rgba(237,224,196,.6); --white:#f5f5f5;
    }
    [data-theme="light"] {
      --bg:#f7f0e1; --blue:#35587e; --blue-l:#44688e; --brown:#8a5a2e;
      --cream:#3a3128; --cream-d:rgba(58,49,40,.68); --white:#241d15;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:var(--bg); color:var(--cream);
      font-family:'Inter',system-ui,sans-serif; font-weight:300;
      text-align:center; padding:24px;
    }
    .kapu { width:160px; height:46px; color:var(--brown); margin:0 auto 28px; display:block; }
    .kapu .k-blue { color:var(--blue-l); }
    h1 {
      font-family:'Cormorant Garamond',Georgia,serif; font-weight:300;
      font-size:clamp(2.2rem,7vw,4rem); color:var(--white);
      letter-spacing:.06em; margin-bottom:14px;
    }
    .code { font-size:.78rem; letter-spacing:.3em; color:var(--blue-l); text-transform:uppercase; margin-bottom:22px; }
    p { max-width:440px; margin:0 auto 36px; line-height:1.8; color:var(--cream-d); font-size:.95rem; }
    a.btn {
      display:inline-block; padding:14px 38px; text-decoration:none;
      border:1px solid var(--blue); background:var(--blue); color:#f5f5f5;
      font-size:.76rem; letter-spacing:.16em; text-transform:uppercase;
      transition:background .3s ease;
    }
    a.btn:hover { background:var(--blue-l); border-color:var(--blue-l); }
  </style>
</head>
<body>
  <main>
    <svg class="kapu" viewBox="0 0 120 34" fill="none" aria-hidden="true">
      <path d="M14 32 V13 M106 32 V13" stroke="currentColor" stroke-width="1.4"/>
      <path d="M10 13 H18 M102 13 H110" stroke="currentColor" stroke-width="1.4"/>
      <path d="M14 13 Q60 -8 106 13" stroke="currentColor" stroke-width="1.4"/>
      <path d="M22 15 Q60 -2 98 15" stroke="currentColor" stroke-width="1" opacity=".55"/>
      <g class="k-blue">
        <path d="M60 2 L63 7 L60 12 L57 7 Z" fill="currentColor"/>
        <circle cx="38" cy="8.5" r="1.4" fill="currentColor"/>
        <circle cx="82" cy="8.5" r="1.4" fill="currentColor"/>
      </g>
    </svg>
    <div class="code">404 · Nincs ilyen ösvény</div>
    <h1>Eltévelyedtél, hé!</h1>
    <p>Ez az út nem viszen sehová — de sebaj, megesik az a legjobbakkal es.
       Gyere, mutatom a hazautat.</p>
    <a class="btn" href="https://susuelf.github.io/botoscopeph/">Vissza a fő útra</a>
  </main>
</body>
</html>
